name: CD to Minikube

on:
  push:
    branches: ["main"]

# Optional but recommended: if you push again, cancel the older deploy run automatically
concurrency:
  group: cd-minikube
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure kube context is minikube
        shell: powershell
        run: |
          kubectl config use-context minikube
          kubectl get nodes

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t myapp:${{ github.sha }} .

      - name: Load image into Minikube
        shell: powershell
        run: |
          minikube image load myapp:${{ github.sha }}

      - name: Apply manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        shell: powershell
        run: |
          kubectl set image deployment/myapp myapp=myapp:${{ github.sha }}
          kubectl rollout status deployment/myapp --timeout=180s
          kubectl get pods
          kubectl get svc myapp-svc

      - name: Show service + endpoints (debug)
        shell: powershell
        run: |
          kubectl get svc myapp-svc
          kubectl get endpoints myapp-svc

      - name: Smoke test (kubectl port-forward)
        shell: powershell
        run: |
          # Port-forward service port 80 -> local 5000 in background
          $pf = Start-Process -FilePath "kubectl" -ArgumentList "port-forward","svc/myapp-svc","5000:80" -NoNewWindow -PassThru

          try {
            # Give port-forward a moment to start
            Start-Sleep -Seconds 3

            $url = "http://127.0.0.1:5000/health"
            Write-Host "Testing URL: $url"

            for ($i=1; $i -le 20; $i++) {
              try {
                $resp = Invoke-RestMethod $url -TimeoutSec 5
                Write-Host "Health OK:" $resp
                exit 0
              } catch {
                Write-Host "Not ready yet... attempt $i"
                Start-Sleep -Seconds 2
              }
            }

            throw "Health check failed after retries"
          }
          finally {
            # Stop port-forward
            if ($pf -and !$pf.HasExited) {
              Stop-Process -Id $pf.Id -Force
            }
          }