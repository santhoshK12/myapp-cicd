name: CD to Minikube

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure kube context is minikube
        shell: powershell
        run: |
          kubectl config use-context minikube
          kubectl get nodes

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t myapp:${{ github.sha }} .

      - name: Load image into Minikube
        shell: powershell
        run: |
          minikube image load myapp:${{ github.sha }}

      - name: Apply manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        shell: powershell
        run: |
          kubectl set image deployment/myapp myapp=myapp:${{ github.sha }}
          kubectl rollout status deployment/myapp --timeout=180s
          kubectl get pods
        
      - name: Show service + endpoints (debug)
        shell: powershell
        run: |
          kubectl get svc myapp-svc
          kubectl get endpoints myapp-svc
          kubectl describe svc myapp-svc

      - name: Smoke test (direct NodePort)
        shell: powershell
        run: |
          # Get Minikube IP
          $ip = minikube ip

          # Get NodePort
          $nodePort = kubectl get svc myapp-svc -o jsonpath="{.spec.ports[0].nodePort}"

          Write-Host "Minikube IP: $ip"
          Write-Host "NodePort: $nodePort"

          $url = "http://$ip:$nodePort/health"
          Write-Host "Testing URL: $url"

          # Retry health check
          for ($i=1; $i -le 20; $i++) {
            try {
              $resp = Invoke-RestMethod $url -TimeoutSec 5
              Write-Host "Health OK:" $resp
              exit 0
            } catch {
              Write-Host "Not ready yet... attempt $i"
              Start-Sleep -Seconds 3
            }
          }

          throw "Health check failed"