name: CD to Minikube

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-minikube
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure kube context is minikube
        shell: powershell
        run: |
          kubectl config use-context minikube
          kubectl get nodes

      - name: Build Docker image (CI-tested commit)
        shell: powershell
        run: |
          docker build -t myapp:${{ github.event.workflow_run.head_sha }} .

      - name: Load image into Minikube
        shell: powershell
        run: |
          minikube image load myapp:${{ github.event.workflow_run.head_sha }}

      - name: Apply manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image + rollout
        shell: powershell
        run: |
          kubectl set image deployment/myapp myapp=myapp:${{ github.event.workflow_run.head_sha }}
          kubectl rollout status deployment/myapp --timeout=180s
          kubectl get pods
          kubectl get svc myapp-svc

      - name: Smoke test (kubectl port-forward)
        shell: powershell
        run: |
          $pf = Start-Process -FilePath "kubectl" -ArgumentList "port-forward","svc/myapp-svc","5000:80" -NoNewWindow -PassThru
          try {
            Start-Sleep -Seconds 3
            $url = "http://127.0.0.1:5000/health"
            Write-Host "Testing URL: $url"

            for ($i=1; $i -le 20; $i++) {
              try {
                $resp = Invoke-RestMethod $url -TimeoutSec 5
                Write-Host "Health OK:" $resp
                exit 0
              } catch {
                Write-Host "Not ready yet... attempt $i"
                Start-Sleep -Seconds 2
              }
            }

            throw "Health check failed after retries"
          }
          finally {
            if ($pf -and !$pf.HasExited) { Stop-Process -Id $pf.Id -Force }
          }

      - name: Rollback if anything failed
        if: failure()
        shell: powershell
        run: |
          kubectl rollout undo deployment/myapp
          kubectl rollout status deployment/myapp --timeout=180s